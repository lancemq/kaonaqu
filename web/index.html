<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考哪去 - 上海中考择校指南</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header class="bg-primary text-white py-4">
        <div class="container">
            <h1 class="display-4">考哪去</h1>
            <p class="lead">上海中考择校指南 - 为您提供最全面的中学信息和招生政策</p>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="#schools">中学列表</a></li>
                    <li class="nav-item"><a class="nav-link" href="#policies">招生政策</a></li>
                    <li class="nav-item"><a class="nav-link" href="#districts">区域分析</a></li>
                    <li class="nav-item"><a class="nav-link" href="#topics">热门话题</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <!-- 中学列表 -->
        <section id="schools" class="mb-5">
            <h2 class="mb-4">上海各区中学列表</h2>
            <div class="row" id="schools-container">
                <!-- 学校数据将通过JavaScript动态加载 -->
                <div class="col-12 text-center">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 招生政策 -->
        <section id="policies" class="mb-5">
            <h2 class="mb-4">招生政策</h2>
            <div id="policies-container">
                <!-- 政策数据将通过JavaScript动态加载 -->
                <div class="text-center">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 区域分析 -->
        <section id="districts" class="mb-5">
            <h2 class="mb-4">上海各区教育概况</h2>
            <div id="districts-container">
                <!-- 区域数据将通过JavaScript动态加载 -->
                <div class="text-center">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 热门话题 -->
        <section id="topics" class="mb-5">
            <h2 class="mb-4">热门话题讨论</h2>
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">即将推出</h5>
                    <p class="card-text">我们将陆续添加以下热门话题：</p>
                    <ul>
                        <li>各校录取分数线分析</li>
                        <li>特色班型对比（实验班、创新班等）</li>
                        <li>升学率和高考成绩</li>
                        <li>校园环境和设施介绍</li>
                        <li>家长和学生真实评价</li>
                    </ul>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container">
            <p class="mb-0">© 2026 考哪去 - 上海中考择校指南</p>
            <p class="mb-0 small">数据更新至2026年3月 | 仅供参考，具体政策请以官方发布为准</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
