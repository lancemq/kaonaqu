<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考哪去 - 上海中考信息 MVP</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar" aria-label="顶部导航">
            <a class="brand-mark" href="#top" aria-label="考哪去首页">
                <span class="brand-badge" aria-hidden="true">
                    <span class="brand-dot brand-dot-blue"></span>
                    <span class="brand-dot brand-dot-red"></span>
                    <span class="brand-dot brand-dot-yellow"></span>
                    <span class="brand-dot brand-dot-green"></span>
                </span>
                <span class="brand-text">
                    <strong>考哪去</strong>
                    <span>Shanghai Zhongkao Guide</span>
                </span>
            </a>
            <nav class="top-links">
                <a href="#schools">学校</a>
                <a href="#districts">区域</a>
                <a href="#policies">政策</a>
            </nav>
            <a class="top-cta" href="#schools">开始查找</a>
        </header>

        <header class="hero" id="top">
            <section class="search-panel" aria-label="搜索与筛选">
                <div class="search-panel-head">
                    <h2>开始搜索</h2>
                    <p>输入学校名、区域或招生特色，直接进入结果。</p>
                </div>
                <div class="search-shell">
                    <label class="search-field search-field-main" for="search-input">
                        <span class="visually-hidden">搜索学校、区域或关键词</span>
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M10.5 4a6.5 6.5 0 1 0 4.03 11.6l4.43 4.43 1.41-1.41-4.43-4.43A6.5 6.5 0 0 0 10.5 4Zm0 2a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9Z"></path>
                        </svg>
                        <input id="search-input" type="search" placeholder="搜索学校、区域、招生特色，例如：徐汇区、复旦、科技创新">
                    </label>
                    <label class="search-field search-field-select" for="district-filter">
                        <span class="visually-hidden">按区域筛选</span>
                        <select id="district-filter" aria-label="按区域筛选"></select>
                    </label>
                </div>
                <div class="search-actions">
                    <button class="action-button" id="search-trigger" type="button">搜索学校</button>
                    <button class="action-button action-button-secondary" id="reset-filters" type="button">重置条件</button>
                </div>
                <div class="quick-searches" aria-label="快速搜索">
                    <button class="quick-chip" type="button" data-query="市重点">市重点</button>
                    <button class="quick-chip" type="button" data-query="实验">实验学校</button>
                    <button class="quick-chip" type="button" data-query="科技">科技特色</button>
                    <button class="quick-chip" type="button" data-query="国际">国际课程</button>
                </div>
            </section>
        </header>

        <main class="layout">
            <section class="panel summary-panel">
                <div class="summary-copy">
                    <h2>搜索结果工作区</h2>
                    <p id="result-summary">正在加载数据。</p>
                </div>
                <div class="stats-bar" aria-label="结果统计">
                    <div>
                        <strong id="school-count">0</strong>
                        <span>所学校</span>
                    </div>
                    <div>
                        <strong id="policy-count">0</strong>
                        <span>条相关政策</span>
                    </div>
                </div>
            </section>

            <section class="content-layout">
                <section class="content-main" id="schools">
                    <div class="panel main-panel">
                        <div class="section-heading">
                            <h2>学校结果</h2>
                            <p>优先展示学校本身，把区域和政策放到右侧辅助决策栏，减少上下跳读。</p>
                        </div>
                        <div id="school-list" class="school-grid"></div>
                    </div>
                </section>

                <aside class="content-side">
                    <section class="panel side-panel" id="districts">
                        <div class="section-heading">
                            <h2>区域筛选</h2>
                            <p>点击区域即可切换学校和政策上下文。</p>
                        </div>
                        <div id="district-list" class="district-grid"></div>
                    </section>

                    <section class="panel side-panel" id="policies">
                        <div class="section-heading">
                            <h2>相关政策</h2>
                            <p>仅展示与当前搜索范围关联的政策摘要，便于快速核对。</p>
                        </div>
                        <div id="policy-list" class="policy-list"></div>
                    </section>
                </aside>
            </section>
        </main>
    </div>

    <template id="empty-state-template">
        <div class="empty-state">
            <h3>暂无数据</h3>
            <p>当前条件下没有匹配结果。</p>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
